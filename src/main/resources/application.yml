server:
  port: 8080

spring:
  application:
    name: cart-payment-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:app}}
    username: ${DATABASE_USER:app}
    password: ${DATABASE_PASSWORD:}
  flyway:
    enabled: true
    default-schema: cart_payment_service
    schemas: cart_payment_service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
